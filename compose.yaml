services:
  ai-career-os:
    build: .
    image: ai-career-os:latest
    container_name: ai-career-os
    stdin_open: true
    tty: true
    ports:
      - "8000:8000"
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_USER: stefano
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_career_os

  redis:
    image: redis:8
    container_name: redis-cache
